naftiko: "1.0.0-alpha2"

info:
  label: "Restaurant365 OData Connector — Transactions"
  description: >-
    Transactions — Transactions. 2 operations. Lead operation: List Transactions.
    Self-contained Naftiko capability covering one Restaurant365 business surface.
  tags:
    - Restaurant365
    - OData Connector
    - Transactions
  created: "2026-06-03"
  modified: "2026-06-03"

binds:
  - namespace: env
    keys:
      R365_ODATA_USERNAME: R365_ODATA_USERNAME
      R365_ODATA_PASSWORD: R365_ODATA_PASSWORD

capability:

  consumes:
    - type: http
      namespace: "odata-connector-transactions"
      baseUri: "https://odata.restaurant365.net/api/v2/views"
      description: "Restaurant365 OData Connector — Transactions business capability. Self-contained, no shared references."
      authentication:
        type: basic
        username: "{{env.R365_ODATA_USERNAME}}"
        password: "{{env.R365_ODATA_PASSWORD}}"
      resources:
        - name: "transaction"
          path: "/Transaction"
          operations:
            - name: "listTransactions"
              method: GET
              description: "Retrieve a list of financial transactions."
              inputParameters:
                - name: "$filter"
                  in: query
                  type: string
                  required: false
                  description: "OData filter expression."
                - name: "$top"
                  in: query
                  type: integer
                  required: false
                  description: "Maximum results to return."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "transaction-detail"
          path: "/TransactionDetail"
          operations:
            - name: "listTransactionDetail"
              method: GET
              description: "Retrieve financial transaction details at the item level."
              inputParameters:
                - name: "$filter"
                  in: query
                  type: string
                  required: false
                  description: "OData filter expression."
                - name: "$top"
                  in: query
                  type: integer
                  required: false
                  description: "Maximum results to return."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      namespace: "odata-connector-transactions-rest"
      port: 8080
      description: "REST adapter for Restaurant365 OData Connector — Transactions. One Spectral-compliant resource per consumed operation, prefixed with /v1."
      resources:
        - path: "/v1/transactions"
          name: "transactions"
          description: "REST surface for transactions."
          operations:
            - method: GET
              name: "listTransactions"
              description: "Retrieve a list of financial transactions."
              call: "odata-connector-transactions.listTransactions"
              with:
                "$filter": "rest.filter"
                "$top": "rest.top"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/transaction-detail"
          name: "transaction-detail"
          description: "REST surface for transaction detail."
          operations:
            - method: GET
              name: "listTransactionDetail"
              description: "Retrieve financial transaction details at the item level."
              call: "odata-connector-transactions.listTransactionDetail"
              with:
                "$filter": "rest.filter"
                "$top": "rest.top"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      namespace: "odata-connector-transactions-mcp"
      port: 9090
      transport: http
      description: "MCP adapter for Restaurant365 OData Connector — Transactions. One tool per consumed operation, routed inline through this capability's consumes block."
      tools:
        - name: "list-transactions"
          description: "Retrieve a list of financial transactions."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "odata-connector-transactions.listTransactions"
          with:
            "$filter": "tools.filter"
            "$top": "tools.top"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "list-transaction-detail"
          description: "Retrieve financial transaction details at the item level."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "odata-connector-transactions.listTransactionDetail"
          with:
            "$filter": "tools.filter"
            "$top": "tools.top"
          outputParameters:
            - type: object
              mapping: "$."
