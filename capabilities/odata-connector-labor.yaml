naftiko: "1.0.0-alpha2"

info:
  label: "Restaurant365 OData Connector — Labor"
  description: >-
    Labor — Labor. 4 operations. Lead operation: List Employees.
    Self-contained Naftiko capability covering one Restaurant365 business surface.
  tags:
    - Restaurant365
    - OData Connector
    - Labor
  created: "2026-06-03"
  modified: "2026-06-03"

binds:
  - namespace: env
    keys:
      R365_ODATA_USERNAME: R365_ODATA_USERNAME
      R365_ODATA_PASSWORD: R365_ODATA_PASSWORD

capability:

  consumes:
    - type: http
      namespace: "odata-connector-labor"
      baseUri: "https://odata.restaurant365.net/api/v2/views"
      description: "Restaurant365 OData Connector — Labor business capability. Self-contained, no shared references."
      authentication:
        type: basic
        username: "{{env.R365_ODATA_USERNAME}}"
        password: "{{env.R365_ODATA_PASSWORD}}"
      resources:
        - name: "employee"
          path: "/Employee"
          operations:
            - name: "listEmployees"
              method: GET
              description: "List all employees with basic information."
              inputParameters:
                - name: "$filter"
                  in: query
                  type: string
                  required: false
                  description: "OData filter expression."
                - name: "$top"
                  in: query
                  type: integer
                  required: false
                  description: "Maximum results to return."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "pos-employee"
          path: "/POSEmployee"
          operations:
            - name: "listPosEmployees"
              method: GET
              description: "Retrieve the mapping between R365 and POS employee records."
              inputParameters:
                - name: "$filter"
                  in: query
                  type: string
                  required: false
                  description: "OData filter expression."
                - name: "$top"
                  in: query
                  type: integer
                  required: false
                  description: "Maximum results to return."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "labor-detail"
          path: "/LaborDetail"
          operations:
            - name: "listLaborDetail"
              method: GET
              description: "Retrieve employee punch time details (clock in/out)."
              inputParameters:
                - name: "$filter"
                  in: query
                  type: string
                  required: false
                  description: "OData filter expression."
                - name: "$top"
                  in: query
                  type: integer
                  required: false
                  description: "Maximum results to return."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "payroll-summary"
          path: "/PayrollSummary"
          operations:
            - name: "listPayrollSummary"
              method: GET
              description: "Retrieve a list of labor records summarized for payroll."
              inputParameters:
                - name: "$filter"
                  in: query
                  type: string
                  required: false
                  description: "OData filter expression."
                - name: "$top"
                  in: query
                  type: integer
                  required: false
                  description: "Maximum results to return."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      namespace: "odata-connector-labor-rest"
      port: 8080
      description: "REST adapter for Restaurant365 OData Connector — Labor. One Spectral-compliant resource per consumed operation, prefixed with /v1."
      resources:
        - path: "/v1/employees"
          name: "employees"
          description: "REST surface for employees."
          operations:
            - method: GET
              name: "listEmployees"
              description: "List all employees with basic information."
              call: "odata-connector-labor.listEmployees"
              with:
                "$filter": "rest.filter"
                "$top": "rest.top"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/pos-employees"
          name: "pos-employees"
          description: "REST surface for POS employee mappings."
          operations:
            - method: GET
              name: "listPosEmployees"
              description: "Retrieve the mapping between R365 and POS employee records."
              call: "odata-connector-labor.listPosEmployees"
              with:
                "$filter": "rest.filter"
                "$top": "rest.top"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/labor-detail"
          name: "labor-detail"
          description: "REST surface for labor detail."
          operations:
            - method: GET
              name: "listLaborDetail"
              description: "Retrieve employee punch time details (clock in/out)."
              call: "odata-connector-labor.listLaborDetail"
              with:
                "$filter": "rest.filter"
                "$top": "rest.top"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/payroll-summary"
          name: "payroll-summary"
          description: "REST surface for payroll summary."
          operations:
            - method: GET
              name: "listPayrollSummary"
              description: "Retrieve a list of labor records summarized for payroll."
              call: "odata-connector-labor.listPayrollSummary"
              with:
                "$filter": "rest.filter"
                "$top": "rest.top"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      namespace: "odata-connector-labor-mcp"
      port: 9090
      transport: http
      description: "MCP adapter for Restaurant365 OData Connector — Labor. One tool per consumed operation, routed inline through this capability's consumes block."
      tools:
        - name: "list-employees"
          description: "List all employees with basic information."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "odata-connector-labor.listEmployees"
          with:
            "$filter": "tools.filter"
            "$top": "tools.top"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "list-pos-employees"
          description: "Retrieve the mapping between R365 and POS employee records."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "odata-connector-labor.listPosEmployees"
          with:
            "$filter": "tools.filter"
            "$top": "tools.top"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "list-labor-detail"
          description: "Retrieve employee punch time details (clock in/out)."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "odata-connector-labor.listLaborDetail"
          with:
            "$filter": "tools.filter"
            "$top": "tools.top"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "list-payroll-summary"
          description: "Retrieve a list of labor records summarized for payroll."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "odata-connector-labor.listPayrollSummary"
          with:
            "$filter": "tools.filter"
            "$top": "tools.top"
          outputParameters:
            - type: object
              mapping: "$."
