naftiko: "1.0.0-alpha2"

info:
  label: "Restaurant365 OData Connector — Sales"
  description: >-
    Sales — Sales. 3 operations. Lead operation: List Sales Employee Tickets.
    Self-contained Naftiko capability covering one Restaurant365 business surface.
    Sales views are limited to a 31-day date range per request and do not support $select.
  tags:
    - Restaurant365
    - OData Connector
    - Sales
  created: "2026-06-03"
  modified: "2026-06-03"

binds:
  - namespace: env
    keys:
      R365_ODATA_USERNAME: R365_ODATA_USERNAME
      R365_ODATA_PASSWORD: R365_ODATA_PASSWORD

capability:

  consumes:
    - type: http
      namespace: "odata-connector-sales"
      baseUri: "https://odata.restaurant365.net/api/v2/views"
      description: "Restaurant365 OData Connector — Sales business capability. Self-contained, no shared references."
      authentication:
        type: basic
        username: "{{env.R365_ODATA_USERNAME}}"
        password: "{{env.R365_ODATA_PASSWORD}}"
      resources:
        - name: "sales-employee"
          path: "/SalesEmployee"
          operations:
            - name: "listSalesEmployee"
              method: GET
              description: "Retrieve sales ticket header data (31-day limit, no $select)."
              inputParameters:
                - name: "$filter"
                  in: query
                  type: string
                  required: true
                  description: "Date-range filter; limited to 31 days per request."
                - name: "$top"
                  in: query
                  type: integer
                  required: false
                  description: "Maximum results to return."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "sales-detail"
          path: "/SalesDetail"
          operations:
            - name: "listSalesDetail"
              method: GET
              description: "Retrieve sales ticket line items (31-day limit, no $select)."
              inputParameters:
                - name: "$filter"
                  in: query
                  type: string
                  required: true
                  description: "Date-range filter; limited to 31 days per request."
                - name: "$top"
                  in: query
                  type: integer
                  required: false
                  description: "Maximum results to return."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "sales-payment"
          path: "/SalesPayment"
          operations:
            - name: "listSalesPayment"
              method: GET
              description: "Retrieve sales payment data (31-day limit, no $select)."
              inputParameters:
                - name: "$filter"
                  in: query
                  type: string
                  required: true
                  description: "Date-range filter; limited to 31 days per request."
                - name: "$top"
                  in: query
                  type: integer
                  required: false
                  description: "Maximum results to return."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      namespace: "odata-connector-sales-rest"
      port: 8080
      description: "REST adapter for Restaurant365 OData Connector — Sales. One Spectral-compliant resource per consumed operation, prefixed with /v1."
      resources:
        - path: "/v1/sales-employee"
          name: "sales-employee"
          description: "REST surface for sales ticket headers."
          operations:
            - method: GET
              name: "listSalesEmployee"
              description: "Retrieve sales ticket header data (31-day limit, no $select)."
              call: "odata-connector-sales.listSalesEmployee"
              with:
                "$filter": "rest.filter"
                "$top": "rest.top"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/sales-detail"
          name: "sales-detail"
          description: "REST surface for sales line items."
          operations:
            - method: GET
              name: "listSalesDetail"
              description: "Retrieve sales ticket line items (31-day limit, no $select)."
              call: "odata-connector-sales.listSalesDetail"
              with:
                "$filter": "rest.filter"
                "$top": "rest.top"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/sales-payment"
          name: "sales-payment"
          description: "REST surface for sales payments."
          operations:
            - method: GET
              name: "listSalesPayment"
              description: "Retrieve sales payment data (31-day limit, no $select)."
              call: "odata-connector-sales.listSalesPayment"
              with:
                "$filter": "rest.filter"
                "$top": "rest.top"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      namespace: "odata-connector-sales-mcp"
      port: 9090
      transport: http
      description: "MCP adapter for Restaurant365 OData Connector — Sales. One tool per consumed operation, routed inline through this capability's consumes block."
      tools:
        - name: "list-sales-employee"
          description: "Retrieve sales ticket header data (31-day limit, no $select)."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "odata-connector-sales.listSalesEmployee"
          with:
            "$filter": "tools.filter"
            "$top": "tools.top"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "list-sales-detail"
          description: "Retrieve sales ticket line items (31-day limit, no $select)."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "odata-connector-sales.listSalesDetail"
          with:
            "$filter": "tools.filter"
            "$top": "tools.top"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "list-sales-payment"
          description: "Retrieve sales payment data (31-day limit, no $select)."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "odata-connector-sales.listSalesPayment"
          with:
            "$filter": "tools.filter"
            "$top": "tools.top"
          outputParameters:
            - type: object
              mapping: "$."
