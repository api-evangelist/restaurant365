naftiko: "1.0.0-alpha2"

info:
  label: "Restaurant365 OData Connector — Reference Data"
  description: >-
    Reference Data — Reference Data. 5 operations. Lead operation: List Companies.
    Self-contained Naftiko capability covering one Restaurant365 business surface.
  tags:
    - Restaurant365
    - OData Connector
    - Reference Data
  created: "2026-06-03"
  modified: "2026-06-03"

binds:
  - namespace: env
    keys:
      R365_ODATA_USERNAME: R365_ODATA_USERNAME
      R365_ODATA_PASSWORD: R365_ODATA_PASSWORD

capability:

  consumes:
    - type: http
      namespace: "odata-connector-reference-data"
      baseUri: "https://odata.restaurant365.net/api/v2/views"
      description: "Restaurant365 OData Connector — Reference Data business capability. Self-contained, no shared references."
      authentication:
        type: basic
        username: "{{env.R365_ODATA_USERNAME}}"
        password: "{{env.R365_ODATA_PASSWORD}}"
      resources:
        - name: "company"
          path: "/Company"
          operations:
            - name: "listCompanies"
              method: GET
              description: "List all companies (vendors)."
              inputParameters:
                - name: "$filter"
                  in: query
                  type: string
                  required: false
                  description: "OData filter expression."
                - name: "$top"
                  in: query
                  type: integer
                  required: false
                  description: "Maximum results to return."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "location"
          path: "/Location"
          operations:
            - name: "listLocations"
              method: GET
              description: "List all locations."
              inputParameters:
                - name: "$filter"
                  in: query
                  type: string
                  required: false
                  description: "OData filter expression."
                - name: "$top"
                  in: query
                  type: integer
                  required: false
                  description: "Maximum results to return."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "gl-account"
          path: "/GLAccount"
          operations:
            - name: "listGlAccounts"
              method: GET
              description: "List all GL accounts with details."
              inputParameters:
                - name: "$filter"
                  in: query
                  type: string
                  required: false
                  description: "OData filter expression."
                - name: "$top"
                  in: query
                  type: integer
                  required: false
                  description: "Maximum results to return."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "item"
          path: "/Item"
          operations:
            - name: "listItems"
              method: GET
              description: "List all items with categorization."
              inputParameters:
                - name: "$filter"
                  in: query
                  type: string
                  required: false
                  description: "OData filter expression."
                - name: "$top"
                  in: query
                  type: integer
                  required: false
                  description: "Maximum results to return."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: "job-title"
          path: "/JobTitle"
          operations:
            - name: "listJobTitles"
              method: GET
              description: "List all job titles with details."
              inputParameters:
                - name: "$filter"
                  in: query
                  type: string
                  required: false
                  description: "OData filter expression."
                - name: "$top"
                  in: query
                  type: integer
                  required: false
                  description: "Maximum results to return."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      namespace: "odata-connector-reference-data-rest"
      port: 8080
      description: "REST adapter for Restaurant365 OData Connector — Reference Data. One Spectral-compliant resource per consumed operation, prefixed with /v1."
      resources:
        - path: "/v1/companies"
          name: "companies"
          description: "REST surface for companies."
          operations:
            - method: GET
              name: "listCompanies"
              description: "List all companies (vendors)."
              call: "odata-connector-reference-data.listCompanies"
              with:
                "$filter": "rest.filter"
                "$top": "rest.top"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/locations"
          name: "locations"
          description: "REST surface for locations."
          operations:
            - method: GET
              name: "listLocations"
              description: "List all locations."
              call: "odata-connector-reference-data.listLocations"
              with:
                "$filter": "rest.filter"
                "$top": "rest.top"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/gl-accounts"
          name: "gl-accounts"
          description: "REST surface for GL accounts."
          operations:
            - method: GET
              name: "listGlAccounts"
              description: "List all GL accounts with details."
              call: "odata-connector-reference-data.listGlAccounts"
              with:
                "$filter": "rest.filter"
                "$top": "rest.top"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/items"
          name: "items"
          description: "REST surface for items."
          operations:
            - method: GET
              name: "listItems"
              description: "List all items with categorization."
              call: "odata-connector-reference-data.listItems"
              with:
                "$filter": "rest.filter"
                "$top": "rest.top"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: "/v1/job-titles"
          name: "job-titles"
          description: "REST surface for job titles."
          operations:
            - method: GET
              name: "listJobTitles"
              description: "List all job titles with details."
              call: "odata-connector-reference-data.listJobTitles"
              with:
                "$filter": "rest.filter"
                "$top": "rest.top"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      namespace: "odata-connector-reference-data-mcp"
      port: 9090
      transport: http
      description: "MCP adapter for Restaurant365 OData Connector — Reference Data. One tool per consumed operation, routed inline through this capability's consumes block."
      tools:
        - name: "list-companies"
          description: "List all companies (vendors)."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "odata-connector-reference-data.listCompanies"
          with:
            "$filter": "tools.filter"
            "$top": "tools.top"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "list-locations"
          description: "List all locations."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "odata-connector-reference-data.listLocations"
          with:
            "$filter": "tools.filter"
            "$top": "tools.top"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "list-gl-accounts"
          description: "List all GL accounts with details."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "odata-connector-reference-data.listGlAccounts"
          with:
            "$filter": "tools.filter"
            "$top": "tools.top"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "list-items"
          description: "List all items with categorization."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "odata-connector-reference-data.listItems"
          with:
            "$filter": "tools.filter"
            "$top": "tools.top"
          outputParameters:
            - type: object
              mapping: "$."
        - name: "list-job-titles"
          description: "List all job titles with details."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "odata-connector-reference-data.listJobTitles"
          with:
            "$filter": "tools.filter"
            "$top": "tools.top"
          outputParameters:
            - type: object
              mapping: "$."
