naftiko: "1.0.0-alpha2"

info:
  label: "Restaurant365 OData Connector — Metadata"
  description: >-
    Metadata — Metadata. 1 operation. Lead operation: Get OData Service Metadata.
    Self-contained Naftiko capability covering one Restaurant365 business surface.
  tags:
    - Restaurant365
    - OData Connector
    - Metadata
  created: "2026-06-03"
  modified: "2026-06-03"

binds:
  - namespace: env
    keys:
      R365_ODATA_USERNAME: R365_ODATA_USERNAME
      R365_ODATA_PASSWORD: R365_ODATA_PASSWORD

capability:

  consumes:
    - type: http
      namespace: "odata-connector-metadata"
      baseUri: "https://odata.restaurant365.net/api/v2/views"
      description: "Restaurant365 OData Connector — Metadata business capability. Self-contained, no shared references."
      authentication:
        type: basic
        username: "{{env.R365_ODATA_USERNAME}}"
        password: "{{env.R365_ODATA_PASSWORD}}"
      resources:
        - name: "metadata"
          path: "/$metadata"
          operations:
            - name: "getMetadata"
              method: GET
              description: "Retrieve the OData EDMX metadata document describing all views."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      namespace: "odata-connector-metadata-rest"
      port: 8080
      description: "REST adapter for Restaurant365 OData Connector — Metadata. One Spectral-compliant resource per consumed operation, prefixed with /v1."
      resources:
        - path: "/v1/metadata"
          name: "metadata"
          description: "REST surface for OData metadata."
          operations:
            - method: GET
              name: "getMetadata"
              description: "Retrieve the OData EDMX metadata document describing all views."
              call: "odata-connector-metadata.getMetadata"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      namespace: "odata-connector-metadata-mcp"
      port: 9090
      transport: http
      description: "MCP adapter for Restaurant365 OData Connector — Metadata. One tool per consumed operation, routed inline through this capability's consumes block."
      tools:
        - name: "get-metadata"
          description: "Retrieve the OData EDMX metadata document describing all views."
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "odata-connector-metadata.getMetadata"
          outputParameters:
            - type: object
              mapping: "$."
