description: >-
  FOCUS-aligned FinOps for Restaurant365: a per-location tiered SaaS subscription
  for restaurant accounting, inventory, and operations, with custom enterprise
  quotes and add-on modules. API and OData access is bundled into the subscription
  rather than separately metered.
