aid: restaurant365
name: Restaurant365
description: >-
  Restaurant365 is a cloud-based restaurant accounting, inventory, and
  operations platform serving thousands of restaurant locations across the
  United States. Its developer offering centers on the R365 API, which lets
  approved third-party vendors and partners connect to a customer's R365
  database to retrieve data and create or push records such as AP invoices and
  general ledger entries. A complementary OData connector exposes sales,
  transaction, location, GL account, and employee data for use in external
  reporting and business-intelligence tools. API access is provisioned per
  customer through R365 Support, with bearer-token authentication on every
  request.
type: Index
