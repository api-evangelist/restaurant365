apis:
  - aid: restaurant365:rest-api
    name: R365 API
    description: >-
      The R365 API lets approved third-party services and vendors connect to a Restaurant365 customer database to
      retrieve data and create or push records, including AP invoices, GL-coded AP invoices, and general ledger journal
      entries. A username and password are first exchanged at /APIv1/Authenticate for a bearer token, which is then sent
      on every subsequent request. Access is provisioned per customer by contacting R365 Support to enable a vendor.
    humanURL: https://docs.restaurant365.com/docs/r365-api
    baseURL: https://yourcompany.restaurant365.com
    tags:
      - Invoices
      - General Ledger
      - Accounting
    properties:
