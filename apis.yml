  - aid: restaurant365:odata-connector
    name: Restaurant365 OData Connector
    description: >-
      The Restaurant365 OData connector exposes R365 data to OData-compatible reporting and BI tools through read-only
      views for companies, locations, GL accounts, items, job titles, employees, POS employees, labor detail, payroll
      summary, transactions, transaction detail, sales, and deleted entities. Most views support $filter, $orderby,
      $select, $skip, and $top. Sales views are limited to a 31-day date range per request and do not support $select or
      $count.
    humanURL: https://docs.restaurant365.com/docs/restaurant365-odata-connector
    baseURL: https://odata.restaurant365.net/api/v2/views/
    tags:
      - OData
      - Reporting
