apis:
  - aid: restaurant365:rest-api
    name: R365 API
    description: >-
      The R365 API lets approved third-party services and vendors connect to a
      Restaurant365 customer database to retrieve data and create or push
      records, including AP invoices and general ledger entries. Each request is
      authenticated with a bearer token generated from an authentication
      request. Access is provisioned per customer by contacting R365 Support to
      enable a vendor.
    humanURL: https://docs.restaurant365.com/docs/r365-api
    tags:
      - Invoices
      - General Ledger
      - Accounting
    properties:
      - type: Documentation
        url: https://docs.restaurant365.com/docs/r365-api
      - type: Documentation
        url: https://docs.restaurant365.com/docs/r365-api-connector
  - aid: restaurant365:odata-connector
    name: Restaurant365 OData Connector
    description: >-
      The Restaurant365 OData connector exposes R365 data to OData-compatible
      reporting and BI tools, with views for transactions, transaction detail,
      company, location, GL account, and employee data. Sales data is retrieved
      up to one month (31 days) per request, so historical pulls must be planned
      across multiple calls.
    humanURL: https://docs.restaurant365.com/docs/restaurant365-odata-connector
    baseURL: https://odata.restaurant365.net/api/v2/views/
    tags:
      - OData
      - Reporting
      - Sales
    properties:
      - type: Documentation
        url: https://docs.restaurant365.com/docs/restaurant365-odata-connector
